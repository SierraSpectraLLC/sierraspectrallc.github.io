<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" fill="none" aria-label="Sierra Spectra">
  <defs>
    <linearGradient id="lg1" x1="10" y1="68" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8756A"/>
      <stop offset="1" stop-color="#E8A370"/>
    </linearGradient>
    <linearGradient id="lg2" x1="32" y1="40" x2="50" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8A370"/>
      <stop offset="1" stop-color="#C5D44A"/>
    </linearGradient>
    <linearGradient id="lg3" x1="50" y1="55" x2="70" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C5D44A"/>
      <stop offset="1" stop-color="#7BAFD4"/>
    </linearGradient>
    <linearGradient id="lg4" x1="70" y1="18" x2="100" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7BAFD4"/>
      <stop offset="1" stop-color="#9B8EB8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8756A"/>
      <stop offset="25%"  stop-color="#E8A370"/>
      <stop offset="50%"  stop-color="#C5D44A"/>
      <stop offset="75%"  stop-color="#7BAFD4"/>
      <stop offset="100%" stop-color="#9B8EB8"/>
    </linearGradient>
  </defs>

  <!-- Chart mark, centered horizontally in 220 wide canvas (offset ~55 to center 110-wide mark) -->
  <g transform="translate(55,4)">
    <line x1="10" y1="68" x2="32" y2="40" stroke="url(#lg1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="32" y1="40" x2="50" y2="55" stroke="url(#lg2)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="50" y1="55" x2="70" y2="18" stroke="url(#lg3)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="70" y1="18" x2="100" y2="68" stroke="url(#lg4)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="10"  cy="68" r="5.5" fill="#E8756A"/>
    <circle cx="32"  cy="40" r="5.5" fill="#E8A370"/>
    <circle cx="50"  cy="55" r="5.5" fill="#C5D44A"/>
    <circle cx="70"  cy="18" r="5.5" fill="#7BAFD4"/>
    <circle cx="100" cy="68" r="5.5" fill="#9B8EB8"/>
  </g>

  <!-- Wordmark -->
  <text
    x="110" y="118"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="400"
    letter-spacing="6"
    fill="#1e2035"
  >SIERRA • SPECTRA</text>
</svg>
